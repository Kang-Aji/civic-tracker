<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Elected Officials Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body data-debug="{{ 'true' if debug_mode else 'false' }}">
    <div class="container">
        <h1>US Elected Officials Tracker</h1>
        {% if debug_mode %}
        <div class="debug-info">
            <p>Debug Mode: ON</p>
            <p>Check browser console for detailed logs</p>
        </div>
        {% endif %}
        <div class="search-section">
            <div class="address-input-container">
                <input type="text" id="address" placeholder="Enter your address" autocomplete="off">
                <div id="address-suggestions" class="suggestions-container"></div>
            </div>
            <button onclick="searchRepresentatives()">Search</button>
        </div>
        <div id="results" class="results-section"></div>
        
        <!-- Action Tracker Section -->
        <div id="action-tracker" class="action-tracker-section">
            <!-- Content will be dynamically loaded -->
        </div>
    </div>
    
    <!-- Load JavaScript -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Load Google Maps API dynamically
        function loadGoogleMapsAPI() {
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key={{ google_api_key }}&libraries=places&callback=initAutocomplete`;
            script.async = true;
            script.defer = true;
            document.head.appendChild(script);
        }

        // Handle API loading errors
        window.gm_authFailure = function() {
            console.error('Google Maps API authentication failed');
            document.getElementById('address').placeholder = 'Error loading Google Maps API';
            document.getElementById('address').disabled = true;
        };

        // Initialize UI elements
        document.addEventListener('DOMContentLoaded', function() {
            // Hide the action tracker section initially
            const actionTrackerSection = document.getElementById('action-tracker');
            if (actionTrackerSection) {
                actionTrackerSection.style.display = 'none';
            }
        });

        // Load the Google Maps API
        loadGoogleMapsAPI();
    </script>
</body>
</html>
